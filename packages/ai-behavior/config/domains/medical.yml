domain: medical
llmId: health_coach

# medical.yml feeds the health domain LLM with consent-gated medical context
# and the consent-gated medical save proposal variant.
# Medical attachment consent is gated by user-declared category/document-type
# + MIME at upload — not by LLM classification.

intents:
  - id: review_health_context
    description: >-
      Provide conservative wellness coaching informed by consent-approved
      health document summaries.
    mapsToCapabilityId: ask_health_context

tools:
  - getDocumentContext
  - getUserContextSlice

signals:
  - id: medical_reference
    patterns:
      - '\b(lab|blood\s+test|report|diagnosis|doctor|physician|medical|health\s+document)\b'
  - id: symptoms
    patterns:
      - '\b(symptom|pain|dizzy|nausea|fever|breathing|chest)\b'

prompts:
  - key: medical_domain_system
    body: >-
      You are a wellness coach reviewing consent-approved health document
      summaries. Provide conservative coaching context only. Never
      diagnose, interpret labs as medical treatment guidance, or prescribe
      treatment. Refer the user to their healthcare provider for medical
      questions. Use only approved document summaries — never raw document
      contents.
    placeholders: []

safetyNotes:
  - Never diagnose, prescribe treatment, or interpret labs as medical guidance.
  - Use only consent-approved document summaries — never raw document contents.
  - Medical document save is a consent-gated proposal; never auto-persist health_documents.
  - Direct users to their healthcare provider for medical questions.
