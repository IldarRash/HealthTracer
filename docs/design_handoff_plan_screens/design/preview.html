<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<title>preview</title>
<style>html,body{margin:0;background:#0b0d0e}#root{width:1200px;height:820px;overflow:hidden}*{box-sizing:border-box}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="app/kit.jsx"></script>
<script type="text/babel" src="app/shell.jsx"></script>
<script type="text/babel" src="app/states.jsx"></script>
<script type="text/babel" src="app/proposal.jsx"></script>
<script type="text/babel" src="app/chat.jsx"></script>
<script type="text/babel" src="app/today.jsx"></script>
<script type="text/babel" src="app/longevity.jsx"></script>
<script type="text/babel" src="app/workouts.jsx"></script>
<script type="text/babel" src="app/nutrition.jsx"></script>
<script type="text/babel" src="app/profile.jsx"></script>
<script type="text/babel" src="app/onboarding.jsx"></script>
<script type="text/babel" src="app/paywall.jsx"></script>
<script type="text/babel" data-presets="react">
const screens = {
  'chat-empty': () => <ChatEmpty/>,
  'chat-dialog': () => <ChatDialog/>,
  'chat-thinking': () => <ChatThinking/>,
  'chat-error': () => <ChatError/>,
  'chat-crisis': () => <ChatCrisis/>,
  'today-partial': () => <TodayScreen state="partial"/>,
  'today-done': () => <TodayScreen state="done"/>,
  'today-empty': () => <TodayScreen state="empty"/>,
  'longevity': () => <LongevityScreen state="done"/>,
  'training': () => <WorkoutsScreen state="done"/>,
  'nutrition': () => <NutritionScreen state="done"/>,
  'profile': () => <ProfileScreen/>,
  'onb-welcome': () => <OnboardingScreen step="welcome"/>,
  'onb-goal': () => <OnboardingScreen step="goal"/>,
  'onb-done': () => <OnboardingScreen step="done"/>,
  'consent': () => <ConsentScreen/>,
  'pricing': () => <PricingScreen/>,
  'limit': () => <LimitReachedScreen/>,
  'prop-a': () => <PFrame variant="A"/>,
  'prop-b': () => <PFrame variant="B"/>,
  'prop-c': () => <PFrame variant="C"/>,
  'prop-accepted': () => <PFrame variant="A" state="accepted"/>,
  'prop-edit': () => <PFrame variant="A" state="edit"/>,
  'prop-rejected': () => <PFrame variant="A" state="rejected"/>,
};
function PFrame({ variant='A', state='proposed' }){
  return <div style={{width:'100%',height:'100%',background:L.panel,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:FONT,padding:40}}>
    <div style={{width:560}}>
      <ProposalCard variant={variant} state={state} domain="training"
        title="Сдвинуть силовую с четверга на пятницу"
        why="В четверг у вас встречи до позднего вечера, а восстановление за последние дни ниже обычного. В пятницу будет больше сил и времени."
        changes={[{from:{k:'Четверг',v:'Силовая · 45 мин'},to:{k:'Пятница',v:'Силовая · 45 мин'}},{from:{k:'Четверг',v:'—'},to:{k:'Четверг',v:'Лёгкая прогулка · 20 мин'}}]} />
    </div></div>;
}
const key = new URLSearchParams(location.search).get('s') || 'chat-dialog';
const C = screens[key] || screens['chat-dialog'];
ReactDOM.createRoot(document.getElementById('root')).render(<C/>);
function fit(){ const r=document.getElementById('root'); const s=Math.min(1, window.innerWidth/1200); r.style.transform='scale('+s+')'; r.style.transformOrigin='top left'; document.body.style.height=(820*s)+'px'; document.body.style.width=(1200*s)+'px'; }
window.addEventListener('resize', fit); setTimeout(fit, 50); fit();
</script>
</body>
</html>
