services:
  postgres:
    image: postgres:16-alpine
    container_name: health_tracer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: health_tracer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_tracer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

